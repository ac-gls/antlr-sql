name: Build frontend JSDoc

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'jsdoc.frontend.json'
      - '.github/workflows/build-frontend-jsdoc.yml'

permissions:
  contents: write

jobs:
  build-jsdoc:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build JSDoc
        run: npx jsdoc -c jsdoc.frontend.json

      - name: Add .nojekyll to generated folder
        run: touch docs/.nojekyll

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/frontend/jsdoc docs/.nojekyll
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Build frontend JSDoc"
          git push